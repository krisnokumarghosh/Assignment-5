<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issue Tracker | Home</title>

     <!-- daisyUI and Tailwind -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
     <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

     <!-- google font -->
      <link rel="preconnect" href="https://fonts.googleapis.com">
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
      <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

      <!-- stylesheet -->
       <link rel="stylesheet" href="./styles/style.css">
</head>
<body class="bg-[#F8FAFC] min-h-screen"> 
    <nav class="bg-white shadow py-4">
        <section class="md:flex justify-between items-center px-9">
            <div class="md:flex items-center gap-2">
                <img src="./assets/github-logo.png" alt="" class="w-9 h-[37px]">
                <h2 class="font-semibold text-[24px] text-[#1F2937]">GitHub Issues Tracker</h2>
            </div>

            <div class="flex gap-3">
                <!-- search div -->
                <div>
                 <div>
                   <div>
                     <label class="input validator join-item">
                     <input id="input-search" type="text" placeholder="Search issues...." required />
                     </label>
                  </div>
                </div>
                </div>

                <button class="btn btn-primary">+  New Issue</button>
            </div>
        </section>
    </nav>

    <main class="my-[70px] max-w-[80%] mx-auto ">
        <!-- btn section -->
         <section class="bg-white p-6 rounded-md shadow flex flex-wrap gap-4 mb-5">
            <button onclick="showOnly('all-btn') , activeOnly('all-issue-container')" id="all-btn" class="btn btn-primary px-[49px]">All</button>
            <button onclick="showOnly('open-btn') , loadOpenData() , activeOnly('open-section')" id="open-btn"class="btn px-[49px]">Open</button>
            <button onclick="showOnly('closed-btn') , loadClosedData() , activeOnly('closed-section')" id="closed-btn"class="btn px-[49px]">Closed</button>
         </section>

         <!-- spinner -->

         <section id="spinner" class="flex justify-center hidden">
            <span class="loading loading-dots loading-xl"></span>
         </section>

         <!-- cards -->

         <section id="issue-container">
            <!-- all section -->
         <section id="all-issue-container" class="bg-[#FBFBFB] shadow rounded-md">

            <div id="all-issue-count" class="p-6 md:flex justify-between items-center bg-white rounded-md shadow"></div>

            
            <div id="all-issue-cards" class="p-6 grid md:grid-cols-2 lg:grid-cols-4 gap-3"></div>

         </section>


         <!-- open section -->
          <section id="open-section" class="bg-[#FBFBFB] shadow rounded-md hidden">

            <div id="open-issue-count" class="p-6 md:flex justify-between items-center bg-white rounded-md shadow"></div>

            <div id="open-issue-container" class="p-6 grid md:grid-cols-2 lg:grid-cols-4 gap-3"></div>


          </section>


          <!-- closed section -->
           <section id="closed-section" class="bg-[#FBFBFB] shadow rounded-md hidden">

            <div id="closed-issue-count" class="p-6 md:flex justify-between items-center bg-white rounded-md shadow"></div>

            <div id="closed-issue-container" class="p-6 grid md:grid-cols-2 lg:grid-cols-4 gap-3"></div>

           </section>
         </section>
    </main>



    <script src="./script/home.js"></script>
</body>
</html>
